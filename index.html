<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Tulsi Japa Mala</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="control-row">
          <button id="beadStyleBtn" class="icon-btn" type="button" aria-label="Стиль бусин">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <path d="M33.126 44.979c-2.951-2.363-7.736-2.363-10.687 0c-2.948 2.364-2.948 6.195 0 8.559c2.95 2.364 7.735 2.364 10.687 0c2.949-2.364 2.949-6.195 0-8.559" fill="#7F4D28"></path>
              <path d="M21.786 41.57c2.287-2.841 1.513-6.43-1.727-8.014c-3.241-1.583-7.72-.564-10.007 2.277c-2.284 2.841-1.512 6.43 1.727 8.014c3.242 1.585 7.722.565 10.007-2.277" fill="#8C5930"></path>
              <path d="M18.683 28.018c2.189-2.446 1.66-5.713-1.183-7.297c-2.842-1.585-6.919-.887-9.109 1.559c-2.19 2.446-1.66 5.712 1.182 7.296c2.842 1.585 6.921.887 9.11-1.558" fill="#9B693A"></path>
              <path d="M20.7 19.308c2.718 1.582 6.669.98 8.823-1.341c2.155-2.322 1.7-5.485-1.017-7.066c-2.717-1.582-6.668-.981-8.822 1.34c-2.156 2.322-1.701 5.485 1.016 7.067" fill="#A57645"></path>
              <path d="M43.646 15.271c2.42-1.237 2.689-3.667.6-5.43c-2.087-1.763-5.746-2.19-8.167-.954c-2.422 1.236-2.69 3.667-.601 5.43s5.748 2.19 8.168.954" fill="#B28553"></path>
              <path d="M52.475 33.199c-2.164-.636-4.031-1.186-4.544-2.459c-.297-.738-.181-1.822.323-3.221c5.366-5.02 13.394-13.109 13.168-16.396c-.09-1.314-2.184-3.196-3.557-3.196l-.108.004c-1.486.102-3.757 2.068-6.183 4.73a10.075 10.075 0 0 0-.781-1.761C48.248 6.515 42.653 4 35.444 4c-5.605 0-11.846 1.545-18.045 4.468c-7.957 3.752-13.9 11.576-15.14 19.934c-.922 6.206.18 15.592 10.658 25.075C17.563 57.684 24.879 60 33.514 60h.003c6.932 0 13.955-1.543 19.271-4.23C58.729 52.765 62 48.609 62 44.066c0-8.066-5.506-9.685-9.525-10.867m5.39-23.772c.631 0 2.027 1.31 2.06 1.798c.191 2.783-9.723 12.647-16.35 18.529l-1.13-.983l-.739-.645c4.932-7.358 13.366-18.509 16.159-18.699M39.266 31.06l1.522-1.745l1.731 1.51L41 32.569l-1.734-1.509m12.62 22.924C46.84 56.536 40.146 58 33.517 58h-.002c-8.14 0-14.978-2.133-19.256-6.006C4.435 43.105 3.386 34.418 4.235 28.695c1.146-7.714 6.648-14.943 14.019-18.418C24.187 7.479 30.132 6 35.444 6c6.383 0 11.473 2.207 13.618 5.904c.462.795.772 1.645.952 2.535c-4.478 5.283-9.026 12.053-9.895 13.359l-2.777 3.184c-1.458-.015-2.918.622-3.368 2.161c-1.658 5.655-5.351 9.162-5.351 9.162s9.361-1.85 11.152-3.952c.97-1.138 1.44-2.498 1.429-3.738l2.908-3.334c.388-.341.965-.854 1.676-1.496c-.004.624.082 1.194.286 1.702c.875 2.172 3.284 2.88 5.835 3.63c3.977 1.17 8.09 2.379 8.09 8.949c.001 3.75-2.882 7.272-8.113 9.918" fill="#2A180B"></path>
              <path d="M54.121 39.807c-2.95-2.363-7.736-2.363-10.686 0s-2.949 6.195 0 8.559s7.735 2.363 10.686 0s2.95-6.196 0-8.559m-1.453 7.394c-2.147 1.721-5.633 1.721-7.779 0c-2.147-1.721-2.147-4.51 0-6.23c2.146-1.721 5.632-1.721 7.779 0s2.147 4.509 0 6.23" fill="#C08C55"></path>
            </svg>
          </button>
          <button id="soundModeBtn" class="icon-btn" type="button" aria-label="Режим звуку"></button>
          <button id="resetBtn" class="icon-btn reset-round-btn" type="button" aria-label="Скинути поточний раунд">
            <svg viewBox="0 0 512 512" aria-hidden="true">
              <path d="M64,256H34A222,222,0,0,1,430,118.15V85h30V190H355V160h67.27A192.21,192.21,0,0,0,256,64C150.13,64,64,150.13,64,256Zm384,0c0,105.87-86.13,192-192,192A192.21,192.21,0,0,1,89.73,352H157V322H52V427H82V393.85A222,222,0,0,0,478,256Z"/>
            </svg>
          </button>
        </div>
      </header>

      <main class="app-body">
        <div class="status-overlay">
          <p class="status-item"><span id="roundLabel">Раунд:</span> <span id="roundValue">1</span></p>
          <p class="status-item"><span id="beadsLabel">Бусин:</span> <span id="displayValue">1</span>/<span id="displayMax">108</span></p>
        </div>
        <button
          id="nextRoundInlineBtn"
          class="next-round-inline-btn"
          type="button"
          aria-label="Наступний раунд"
          aria-hidden="true"
          disabled
        >
          <svg viewBox="0 0 512 512" aria-hidden="true">
            <path d="M64,256H34A222,222,0,0,1,430,118.15V85h30V190H355V160h67.27A192.21,192.21,0,0,0,256,64C150.13,64,64,150.13,64,256Zm384,0c0,105.87-86.13,192-192,192A192.21,192.21,0,0,1,89.73,352H157V322H52V427H82V393.85A222,222,0,0,0,478,256Z"/>
          </svg>
        </button>

        <section id="beadsMode" class="mode-view">
          <div id="beadsGestureArea" class="beads-area" aria-label="Область жестів бусин">
            <div class="beads-column" id="beadsColumn"></div>
          </div>
        </section>
      </main>
    </div>

    <div id="beadStyleModal" class="modal-backdrop hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="beadStyleTitle">
        <div class="modal-head">
          <h2 id="beadStyleTitle">Налаштування стилю</h2>
          <button id="closeBeadStyleModalBtn" class="modal-close" type="button" aria-label="Закрити">x</button>
        </div>
        <h3 id="beadSectionTitle" class="style-section-title">Бусини</h3>
        <div id="beadStyleOptions" class="style-grid style-panel">
          <button class="style-option style-1" type="button" data-style="style1">
            <span class="style-dot"></span>
            <span id="styleOptionLabel1">Стиль 1</span>
          </button>
          <button class="style-option style-2" type="button" data-style="style2">
            <span class="style-dot"></span>
            <span id="styleOptionLabel2">Стиль 2</span>
          </button>
          <button class="style-option style-3" type="button" data-style="style3">
            <span class="style-dot"></span>
            <span id="styleOptionLabel3">Стиль 3</span>
          </button>
        </div>

        <h3 id="backgroundSectionTitle" class="style-section-title">Фон</h3>
        <div id="backgroundStyleOptions" class="style-grid style-panel">
          <button class="style-option bg-option bg-1" type="button" data-background-style="bg1">
            <span class="bg-dot"></span>
            <span id="bgOptionLabel1">Фон 1</span>
          </button>
          <button class="style-option bg-option bg-2" type="button" data-background-style="bg2">
            <span class="bg-dot"></span>
            <span id="bgOptionLabel2">Фон 2</span>
          </button>
          <button class="style-option bg-option bg-3" type="button" data-background-style="bg3">
            <span class="bg-dot"></span>
            <span id="bgOptionLabel3">Фон 3</span>
          </button>
          <button class="style-option bg-option bg-4" type="button" data-background-style="bg4">
            <span class="bg-dot"></span>
            <span id="bgOptionLabel4">Фон 4</span>
          </button>
          <button class="style-option bg-option bg-5" type="button" data-background-style="bg5">
            <span class="bg-dot"></span>
            <span id="bgOptionLabel5">Фон 5</span>
          </button>
        </div>
      </div>
    </div>

    <div id="soundModeModal" class="modal-backdrop hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="soundModeTitle">
        <div class="modal-head">
          <h2 id="soundModeTitle">Режим звуку</h2>
          <button id="closeSoundModeModalBtn" class="modal-close" type="button" aria-label="Закрити">x</button>
        </div>
        <div id="soundModeOptions" class="sound-grid">
          <button class="sound-option" type="button" data-sound-mode="off">
            <span class="sound-icon" aria-hidden="true"></span>
            <span id="soundModeLabelOff">Без звуку</span>
          </button>
          <button class="sound-option" type="button" data-sound-mode="click">
            <span class="sound-icon" aria-hidden="true"></span>
            <span id="soundModeLabelClick">Клік</span>
          </button>
          <button class="sound-option" type="button" data-sound-mode="mantra">
            <span class="sound-icon" aria-hidden="true"></span>
            <span id="soundModeLabelMantra">Мантра</span>
          </button>
        </div>
      </div>
    </div>

    <div id="resetConfirmModal" class="modal-backdrop hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="resetConfirmTitle">
        <div class="modal-head">
          <h2 id="resetConfirmTitle">Підтвердження скидання</h2>
          <button id="closeResetConfirmModalBtn" class="modal-close" type="button" aria-label="Закрити">x</button>
        </div>
        <p id="resetConfirmText" class="round-complete-text">Скинути весь прогрес? Раунд і бусини будуть обнулені.</p>
        <div class="modal-actions">
          <button id="cancelResetBtn" class="modal-action-btn ghost" type="button">Скасувати</button>
          <button id="confirmResetBtn" class="modal-action-btn danger" type="button">Скинути</button>
        </div>
      </div>
    </div>

    <div id="roundLoader" class="modal-backdrop round-loader-backdrop hidden" aria-hidden="true">
      <span id="roundLoaderSpinner" class="round-loader-spinner" role="status" aria-live="polite"></span>
    </div>

    <div id="startupLoader" class="startup-loader-backdrop" aria-hidden="true">
      <div class="startup-loader-frame" role="status" aria-live="polite">
        <div class="startup-loader-face startup-loader-front">
          <img
            id="startupLoaderImage"
            class="startup-loader-image"
            src="./assets/loader/startup-prabhupada.jpg"
            alt=""
            loading="eager"
            decoding="async"
            fetchpriority="high"
          />
        </div>
        <div class="startup-loader-face startup-loader-back" aria-hidden="true">
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
